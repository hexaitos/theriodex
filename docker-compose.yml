services:
  redis:
    image: valkey/valkey:latest
    volumes:
      - redis_data:/data
    restart: unless-stopped

  theriodex-dev:
    build:
      context: .
      dockerfile: Dockerfile.dev
    ports:
      - "5678:5678"
    environment:
      - REDIS_HOST=redis
    depends_on:
      - redis
    volumes:
      - ./public/sprites:/usr/src/app/public/sprites
      - ./public/cries:/usr/src/app/public/cries
    restart: unless-stopped
    develop:
      watch:
        - action: rebuild
          path: .
          ignore:
            - .git/
        - action: rebuild
          path: Gemfile
        - action: rebuild
          path: Gemfile.lock

volumes:
  redis_data:
